name: Release Pipeline

on:
  push:
    tags:
      - '*'

jobs:
  build-binaries:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Python build tools
      run: pip install build

    - name: Set up Emscripten
      if: matrix.os == 'ubuntu-latest'
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 'latest'

    - name: Set macOS deployment target 
      run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

    - name: Run Build Script
      shell: bash # Use bash even on Windows for script consistency
      env:
        # only linux runner creates the universal tgz
        BUILD_SDIST: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}
        MATRIX_OS: ${{ matrix.os }}
      run: |
        chmod +x scripts/*.sh
        ./scripts/build_libcube.sh package
        ./scripts/pack_pycube.sh
        if [[ "$MATRIX_OS" == "ubuntu-latest" ]]; then
          ./scripts/pack_jscube.sh
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.os }}
        path: dist/*

  publish-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all_dist
        merge-multiple: true

    - name: Create Release and Upload
      uses: softprops/action-gh-release@v1
      with:
        files: all_dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}